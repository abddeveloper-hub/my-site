  <div id="drag-overlay"><div class="drag-msg">Drop Audio File Here</div></div>

  <canvas id="visualizer-canvas"></canvas>

  <!-- UI Control Panel -->
  <div class="control-panel glass-panel">
    <div class="panel-header">/// SYNESTHESIA ENGINE</div>
    
    <label class="upload-btn">
      [ Upload MP3/WAV ]
      <input type="file" id="audio-upload" accept="audio/*">
    </label>
    
    <button class="play-btn" id="play-btn">[ Play / Pause ]</button>

    <div class="slider-group">
      <label><span>Sensitivity</span><span id="sens-val">100%</span></label>
      <input type="range" id="sensitivity" min="0.1" max="2.0" step="0.1" value="1.0">
    </div>
    <div class="slider-group">
      <label><span>Bloom Strength</span><span id="bloom-val">1.5</span></label>
      <input type="range" id="bloom-strength" min="0" max="3" step="0.1" value="1.5">
    </div>
    <div class="slider-group">
      <label><span>Base Speed</span><span id="speed-val">1x</span></label>
      <input type="range" id="base-speed" min="0.1" max="3" step="0.1" value="1.0">
    </div>

    <audio id="audio-element"></audio>
  </div>

  <script src="global.js"></script>
  <script>
    // --- THREE.JS SETUP ---
    const canvas = document.getElementById('visualizer-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 150);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // --- VISUAL ELEMENTS ---
    const group = new THREE.Group();
    scene.add(group);

    // Icosahedron Core
    const coreGeo = new THREE.IcosahedronGeometry(20, 4);
    const coreMat = new THREE.MeshPhysicalMaterial({
      color: 0xff6b3d,
      metalness: 1.0,
      roughness: 0.1,
      wireframe: true,
      emissive: 0xff6b3d,
      emissiveIntensity: 0.5,
      clearcoat: 1.0
    });
    const core = new THREE.Mesh(coreGeo, coreMat);
    group.add(core);

    // Particle Ring
    const particleCount = 1024;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(particleCount * 3);
    for(let i=0; i<particleCount; i++) {
      const angle = (i / particleCount) * Math.PI * 2;
      pPos[i*3] = Math.cos(angle) * 60;
      pPos[i*3+1] = (Math.random() - 0.5) * 10;
      pPos[i*3+2] = Math.sin(angle) * 60;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({
      color: 0x6fe3d9, size: 1.5, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8
    });
    const particles = new THREE.Points(pGeo, pMat);
    group.add(particles);

    // Lights
    const ambientLight = new THREE.AmbientLight(0x222222);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xffeedd, 2, 500);
    scene.add(pointLight);

    // --- POST-PROCESSING ---
    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.2;
    bloomPass.strength = 1.5;
    bloomPass.radius = 0.5;

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // Film Grain
    const filmPass = new THREE.ShaderPass(THREE.FilmShader);
    filmPass.uniforms['nIntensity'].value = 0.3;
    filmPass.uniforms['sIntensity'].value = 0.05;
    filmPass.uniforms['sCount'].value = 648;
    filmPass.uniforms['grayscale'].value = false;
    composer.addPass(filmPass);

    // --- AUDIO SETUP ---
    const audioElement = document.getElementById('audio-element');
    const uploadInput = document.getElementById('audio-upload');
    const playBtn = document.getElementById('play-btn');
    const infoText = document.getElementById('game-info');

    let audioCtx, analyser, dataArray;
    let isPlaying = false;

    // UI Elements
    const sensInput = document.getElementById('sensitivity');
    const sensVal = document.getElementById('sens-val');
    const bloomInput = document.getElementById('bloom-strength');
    const bloomVal = document.getElementById('bloom-val');
    const speedInput = document.getElementById('base-speed');
    const speedVal = document.getElementById('speed-val');

    let sensitivity = parseFloat(sensInput.value);
    let baseSpeed = parseFloat(speedInput.value);

    sensInput.addEventListener('input', (e) => {
      sensitivity = parseFloat(e.target.value);
      sensVal.innerText = Math.round(sensitivity * 100) + '%';
    });
    bloomInput.addEventListener('input', (e) => {
      bloomPass.strength = parseFloat(e.target.value);
      bloomVal.innerText = e.target.value;
    });
    speedInput.addEventListener('input', (e) => {
      baseSpeed = parseFloat(e.target.value);
      speedVal.innerText = e.target.value + 'x';
    });

    // Drag & Drop
    const dragOverlay = document.getElementById('drag-overlay');
    window.addEventListener('dragover', (e) => {
      e.preventDefault();
      dragOverlay.classList.add('active');
    });
    window.addEventListener('dragleave', (e) => {
      e.preventDefault();
      if(e.target === dragOverlay) dragOverlay.classList.remove('active');
    });
    window.addEventListener('drop', (e) => {
      e.preventDefault();
      dragOverlay.classList.remove('active');
      const file = e.dataTransfer.files[0];
      if(file && file.type.startsWith('audio/')) {
        loadAudioFile(file);
      }
    });

    function loadAudioFile(file) {
      const url = URL.createObjectURL(file);
      audioElement.src = url;
      infoText.innerText = "TRACK LOADED // " + file.name.toUpperCase();
      infoText.setAttribute('data-glitch', infoText.innerText);
      if(typeof decodeText === 'function') {
        infoText.dataset.decoded = 'false';
        decodeText(infoText);
      }
    }

    uploadInput.addEventListener('change', function() {
      const file = this.files[0];
      if(file) loadAudioFile(file);
    });

    playBtn.addEventListener('click', () => {
      if(!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaElementSource(audioElement);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 512;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }

      if(audioCtx.state === 'suspended') audioCtx.resume();

      if(audioElement.paused) {
        audioElement.play();
        isPlaying = true;
      } else {
        audioElement.pause();
        isPlaying = false;
      }
    });

    // --- RENDER LOOP ---
    const basePositions = new Float32Array(pPos);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      let currentSpeed = baseSpeed;

      if(analyser && isPlaying) {
        analyser.getByteFrequencyData(dataArray);

        // Calculate frequency bands
        let bass = 0, mid = 0, high = 0;
        for(let i=0; i<10; i++) bass += dataArray[i];
        for(let i=10; i<100; i++) mid += dataArray[i];
        for(let i=100; i<256; i++) high += dataArray[i];
        
        bass = (bass / 10) * sensitivity;
        mid = (mid / 90) * sensitivity;
        high = (high / 156) * sensitivity;
        
        // Dynamic speed based on mid frequencies
        currentSpeed = baseSpeed + (mid / 255) * 5;

        const scale = 1 + (bass / 255) * 1.5;
        core.scale.set(scale, scale, scale);
        coreMat.emissiveIntensity = 0.5 + (bass / 255) * 2;
        pointLight.intensity = 2 + (bass / 255) * 5;

        // Particle displacement based on frequency and high notes
        const positions = pGeo.attributes.position.array;
        for(let i=0; i<particleCount; i++) {
          // Add sensitivity multiplier to val
          const val = Math.min(1.0, (dataArray[i % dataArray.length] / 255) * sensitivity);
          const angle = (i / particleCount) * Math.PI * 2;
          // Expand more on high notes
          const radius = 50 + (val * 40) + (high / 255) * 20;
          
          positions[i*3] += (Math.cos(angle) * radius - positions[i*3]) * 0.1;
          positions[i*3+1] += ((val * 30 * (i%2==0?1:-1)) - positions[i*3+1]) * 0.1;
          positions[i*3+2] += (Math.sin(angle) * radius - positions[i*3+2]) * 0.1;
        }
        pGeo.attributes.position.needsUpdate = true;
      }

      group.rotation.y += 0.002 * currentSpeed;
      group.rotation.x += 0.001 * currentSpeed;

      composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
