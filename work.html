  <div class="page-hero">
    <span class="scene-label">Selected Work</span>
    <h1 class="page-title text-glow"><span class="glitch-text">The Reel</span></h1>
    <div class="page-divider"></div>

  <div class="projects-wrap" id="projects-container">
    <!-- Projects will be loaded from the backend API -->
    <div class="loading-state">[ FETCHING MISSION DATA... ]</div>
  </div>

  <style>
    .loading-state {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--steel);
      text-align: center;
      padding: 5rem;
      width: 100%;
    }
  </style>

  <script>
    async function loadProjects() {
      const container = document.getElementById('projects-container');
      try {
        const response = await fetch('/api/projects');
        const projects = await response.json();

        container.innerHTML = projects.map((p, idx) => `
          <article class="project-card glass-panel reveal tilt-card">
            <div class="project-visual ${idx % 2 === 0 ? 'project-visual--even' : 'project-visual--odd'}">
              <span class="proj-num ${idx % 2 === 0 ? 'proj-num--even' : 'proj-num--odd'}">${String(p.id).padStart(2, '0')}</span>
              <span class="proj-scene ${idx % 2 === 0 ? 'proj-scene--even' : 'proj-scene--odd'}">Scene ${p.id}</span>
            </div>
            <div class="project-info">
              <h3>${p.title}</h3>
              <div class="project-meta"><span>${p.role}</span><span>·</span><span>${p.year}</span></div>
              <div class="project-tags">
                ${p.tags.map(tag => `<span class="project-tag">${tag}</span>`).join('')}
              </div>
              <p class="project-desc">${p.description}</p>
              <a href="${p.link}" class="project-link ${idx % 2 === 0 ? 'project-link--even' : 'project-link--odd'}">View Project →</a>
            </div>
          </article>
        `).join('');

        // Re-initialize reveal observer and tilt for new elements
        initInteractions();

      } catch (err) {
        container.innerHTML = `<div class="loading-state" style="color:var(--ember)">FAILED TO LOAD PROJECTS: ${err.message}</div>`;
      }
    }

    function initInteractions() {
      // 3D Tilt
      document.querySelectorAll('.tilt-card').forEach(card => {
        card.addEventListener('mousemove', e => {
          const r = card.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width - 0.5;
          const y = (e.clientY - r.top) / r.height - 0.5;
          card.style.transform = `perspective(900px) rotateY(${x*8}deg) rotateX(${-y*6}deg) scale(1.01)`;
        });
        card.addEventListener('mouseleave', () => { card.style.transform = ''; });
      });

      // Observer for reveals (global.js handles this usually, but we call it for dynamic content)
      if ('IntersectionObserver' in window) {
        const revealObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
            }
          });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
      }
    }

    window.addEventListener('DOMContentLoaded', loadProjects);
  </script>
